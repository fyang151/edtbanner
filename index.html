    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      overflow: hidden;
    }

    #fluidCanvas {
      position: fixed;
      top: 15vh;
      left: 0;
      width: 100%;
      height: 85vh;
      z-index: 0;
      mask-image: linear-gradient(to bottom, transparent 0px, black 300px);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 300px);
    }

    .sponsor-bar,
    .current-time,
    .timeline {
      position: relative;
      z-index: 1;
    }

    #logo {
      height: 22vh;
      flex-shrink: 0;
      margin-right: 20px;
    }

    .sponsor-bar-scroll {
      flex: 1;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0px, black 120px);
      -webkit-mask-image: linear-gradient(to right, transparent 0px, black 120px);
    }

    .sponsor-bar {
      height: 15vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      background: white;
    }

    .sponsor-bar-track {
      display: flex;
      gap: 60px;
      width: max-content;
      transform: translateY(-1vh);
    }

    .sponsor-bar-track img {
      height: 9vh;
      opacity: 0.8;
      filter: grayscale(30%);
    }

    .current-time {
      height: 55vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .current-time-display {
      font-size: 25vw;
      font-weight: bold;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
    }

    .timeline {
      height: 30vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .timeline iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

  <script src="fluid.js"></script>
  <script>
    const pad2 = n => String(n).padStart(2, '0');

    function getTime() {
      const t = new Date();
      return `${pad2(t.getHours())}:${pad2(t.getMinutes())}:${pad2(t.getSeconds())}`;
    }

    function startClock() {
      const display = document.getElementById('currentTimeDisplay');
      const tick = () => {display.textContent = getTime(); requestAnimationFrame(tick);};
      tick();
    }

    function fillSponsorBar() {
      const track = document.getElementById('sponsorBarTrack');
      const original = track.innerHTML;
      while (track.scrollWidth < window.innerWidth) {
        track.innerHTML += original;
      }
      const gap = parseFloat(getComputedStyle(track).gap) || 0;
      const repeatWidth = track.scrollWidth + gap;
      track.innerHTML += track.innerHTML;

      let x = 0;
      const speed = 1;
      const tick = () => {
        x -= speed;
        if (x <= -repeatWidth) x += repeatWidth;
        track.style.transform = `translateX(${x}px)`;
        requestAnimationFrame(tick);
      };
      tick();
    }

    startClock();
    startFluidSim();
    window.addEventListener('load', fillSponsorBar);
  </script>
